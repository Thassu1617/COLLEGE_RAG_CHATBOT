<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Dost AI</title>
    <!-- FontAwesome for matching look icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #121318;
            --card-bg: rgba(30, 33, 44, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --bubble-bot: #282b36;
            --bubble-user: #224a3a;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-cyan: #3df3ff;
            --accent-purple: #9d5cff;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: linear-gradient(145deg, #0e1015, #1a1d26);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Glassmorphic Central Box Container */
        .chat-window {
            width: 520px;
            height: 720px;
            max-width: 95%;
            max-height: 90vh;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: containerFadeIn 0.5s ease-out;
        }

        /* Top Header Navigation */
        .chat-header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .header-profile {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .main-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #82f4ff, #5163ff);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #121318;
            font-size: 1.3rem;
            box-shadow: 0 0 15px rgba(61, 243, 255, 0.3);
        }

        .profile-info h2 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #22c55e;
            margin-top: 2px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-muted);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Timeline / Chat box Space */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        #chat-box::-webkit-scrollbar {
            width: 4px;
        }
        #chat-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .date-divider {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Message Layout System */
        .msg-row {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .msg-row.bot-row {
            align-self: flex-start;
        }

        .msg-row.user-row {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .bubble-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.85rem;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .bot-row .bubble-avatar {
            background: rgba(61, 243, 255, 0.15);
            color: var(--accent-cyan);
            border: 1px solid rgba(61, 243, 255, 0.2);
        }

        .user-row .bubble-avatar {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .bubble {
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .bot-row .bubble {
            background: var(--bubble-bot);
            color: var(--text-main);
            border-top-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .user-row .bubble {
            background: var(--bubble-user);
            color: #e2fcefff;
            border-top-right-radius: 4px;
            border: 1px solid rgba(34, 197, 94, 0.1);
        }

        .tag-sub {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            color: #c084fc;
            background: rgba(157, 92, 255, 0.12);
            padding: 4px 10px;
            border-radius: 20px;
            margin-top: 8px;
            border: 1px solid rgba(157, 92, 255, 0.15);
        }

        /* Chips Carousel */
        .chips-container {
            padding: 0 24px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 16px;
        }

        .chips-container::-webkit-scrollbar {
            display: none; /* Hide standard track */
        }

        .prompt-chip {
            white-space: nowrap;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .prompt-chip:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        /* Footer Input Section */
        .chat-footer {
            padding: 0 24px 24px 24px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .mic-btn {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-muted);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s ease;
        }

        .mic-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            width: 100%;
            background: rgba(15, 17, 23, 0.6);
            border: 1px solid var(--border-color);
            padding: 14px 54px 14px 18px;
            border-radius: 16px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-wrapper input:focus {
            border-color: rgba(61, 243, 255, 0.4);
            background: rgba(15, 17, 23, 0.8);
            box-shadow: 0 0 15px rgba(61, 243, 255, 0.05);
        }

        .send-btn {
            position: absolute;
            right: 6px;
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--accent-cyan), #2979ff);
            border: none;
            border-radius: 12px;
            color: #121318;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .send-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 12px rgba(61, 243, 255, 0.4);
        }

        /* Loading Wave dots */
        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 6px 4px;
            align-items: center;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: dotWave 1.4s infinite ease-in-out;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes containerFadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes dotWave {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
    </style>
</head>
<body>

<div class="chat-window">
    <!-- Header -->
    <div class="chat-header">
        <div class="header-profile">
            <div class="main-avatar">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
            <div class="profile-info">
                <h2>College Dost</h2>
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    AI Online
                </div>
            </div>
        </div>
        <div class="header-actions">
            <div class="action-btn"><i class="fa-solid fa-magnifying-glass"></i></div>
            <div class="action-btn"><i class="fa-solid fa-gear"></i></div>
        </div>
    </div>

    <!-- Timeline Body Area -->
    <div id="chat-box">
        <div class="date-divider">Today</div>
        
        <!-- Welcome Prompt -->
        <div class="msg-row bot-row">
            <div class="bubble-avatar"><i class="fa-solid fa-robot"></i></div>
            <div>
                <div class="bubble">
                    👋 Hello! I'm <b>@collegedost</b>. How can I help you with your admissions, fees, or courses today?
                </div>
                <div class="tag-sub"><i class="fa-solid fa-wand-magic-sparkles"></i> AI Assistant</div>
            </div>
        </div>
    </div>

    <!-- Interactive Carousel Quick Chips -->


    <!-- Bottom Input Wrapper -->
    <div class="chat-footer">
        <div class="mic-btn"><i class="fa-solid fa-microphone"></i></div>
        <div class="input-wrapper">
            <input type="text" id="question" placeholder="Message @collegedost..." onkeydown="checkKey(event)">
            <button class="send-btn" onclick="sendQuestion()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    function checkKey(e) {
        if (e.key === "Enter") sendQuestion();
    }

    function useChip(text) {
        document.getElementById("question").value = text;
        sendQuestion();
    }

    async function sendQuestion() {
        const inputField = document.getElementById("question");
        const query = inputField.value.trim();
        if (!query) return;

        const chatBox = document.getElementById("chat-box");

        // Render User Block Bubble
        chatBox.innerHTML += `
            <div class="msg-row user-row">
                <div class="bubble-avatar"><i class="fa-solid fa-user"></i></div>
                <div class="bubble">${escapeHtml(query)}</div>
            </div>`;
        
        inputField.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        // Render Loading Dot Sequence
        const tempId = "loader-" + Date.now();
        chatBox.innerHTML += `
            <div class="msg-row bot-row" id="${tempId}">
                <div class="bubble-avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="bubble">
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                </div>
            </div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch("/ask", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ question: query })
            });
            const data = await response.json();
            
            document.getElementById(tempId).remove();

            // Render Bot Response
            chatBox.innerHTML += `
                <div class="msg-row bot-row">
                    <div class="bubble-avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="bubble">${data.answer}</div>
                </div>`;
        } catch (err) {
            document.getElementById(tempId).remove();
            chatBox.innerHTML += `
                <div class="msg-row bot-row">
                    <div class="bubble-avatar"><i class="fa-solid fa-circle-exclamation"></i></div>
                    <div class="bubble" style="color:#ef4444">Connection timeout error. Please retry.</div>
                </div>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
</script>
</body>
</html>
